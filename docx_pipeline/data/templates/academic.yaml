# =============================================================================
# DOCX Pipeline 学术论文配置模板
# =============================================================================
# 适用场景：学术论文、毕业论文、期刊投稿
# 字体方案：宋体（正文）+ 黑体（标题），西文 Times New Roman，12pt 正文
# 段落：1.25 倍行距，2 字符首行缩进
# 页面：A4 纵向，标准页边距
# 转换策略：默认 python-docx（学术文档对样式精确度要求高）
# =============================================================================

project:
  name: "学术论文"
  root: "."

paths:
  md_source: "./md/main.md"
  docx_output: "./output/document.docx"
  json_source: "./output"
  work_dir: "./work"
  reference_docx: ""

fonts:
  east_asian: "宋体"
  latin: "Times New Roman"
  symbol: ""

font_sizes:
  body: 12.0
  table: 10.0
  code: 9.0
  headings:
    h1: 22.0
    h2: 16.0
    h3: 14.0
    h4: 12.0
    h5: 12.0
    h6: 12.0

font_colors:
  body: "auto"
  heading: "auto"
  link: "#0563C1"
  code: "auto"
  code_block_bg: "#F5F5F5"
  blockquote: "#555555"
  horizontal_rule: "#CCCCCC"

page:
  size: "A4"
  orientation: "portrait"
  margins:
    top: 2.54
    bottom: 2.54
    left: 3.18
    right: 3.18

pandoc:
  enabled: false
  extra_args: []
  reference_docx: ""

mermaid:
  enabled: false
  image:
    format: "png"
    dpi: 300
    scale: 1.0
  render:
    mmdc_path: "mmdc"
    puppeteer_config: ""
    timeout: 60

version:
  number: "1.0.0"
  label: ""
  date: ""

styles:
  toc:
    enabled: true
    depth: 3
    title: "目录"
  table:
    style: "Table Grid"
    autofit: true
    header_bold: true
    header_shading: "#D9E2F3"
  paragraph:
    line_spacing: 1.25
    space_after: 0.0
    first_line_indent: 0.74  # ~2 字符 at 12pt
  heading:
    levels:
      h1:
        font_east_asian: "黑体"
        bold: true
      h2:
        font_east_asian: "黑体"
        bold: true
      h3:
        font_east_asian: "黑体"
        bold: true

backup:
  enabled: true
  max_backups: 5
  suffix: ".bak"
